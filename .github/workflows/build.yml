name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Gradle build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload plugin and mod jars
        uses: actions/upload-artifact@v4
        with:
          name: evilkaraoke-jars
          if-no-files-found: error
          path: |
            server-paper/build/libs/server-paper-*.jar
            client-fabric/build/libs/client-fabric-*.jar
            client-neoforge/build/libs/client-neoforge-*.jar
            !**/*-sources.jar
            !**/*-javadoc.jar
